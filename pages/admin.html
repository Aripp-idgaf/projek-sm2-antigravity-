<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin - MediFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="bg-admin">
    <div class="crex-container">
        
        <div class="crex-topnav">
            <div class="crex-pill">
                <div class="crex-item active">Dashboard</div>
                <div class="crex-item">Registrasi</div>
                <div class="crex-item">Kamar RS</div>
                <div class="crex-item text-danger" onclick="logout()">Logout</div>
            </div>
        </div>

        <div class="d-flex justify-content-between align-items-end mb-4">
            <h1 class="fw-bold mb-0" style="color: #0f3057; font-size: 2.5rem;">Welcome in, Admin</h1>
            <div class="d-flex gap-4 text-center">
                <div><h3 class="fw-bold mb-0" style="color:#0f3057;">92</h3><small class="text-muted">Antrean</small></div>
                <div><h3 class="fw-bold mb-0" style="color:#0f3057;">75</h3><small class="text-muted">BPJS</small></div>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-md-4">
                <div class="crex-profile-card">
                    <img src="https://ui-avatars.com/api/?name=Admin+Nixtio&background=fff&color=0ea5e9">
                    <h4 class="fw-bold" style="color: #0f3057;">Admin Nixtio</h4>
                    <p class="text-muted small mb-4">Registrasi & Verifikasi</p>
                    <span class="badge bg-primary bg-opacity-10 text-primary px-4 py-2 rounded-pill mt-4">Active Duty</span>
                </div>
            </div>

            <div class="col-md-4">
                <div class="crex-stat-box">
                    <h5 class="fw-bold mb-4" style="color: #0f3057;">Waktu Antrean</h5>
                    <h1 class="display-4 fw-bold text-primary mb-0">6.1 h</h1>
                    <p class="small text-muted mb-4">Rata-rata waktu tunggu pasien</p>
                    
                    <div class="d-flex align-items-end gap-2" style="height: 80px;">
                        <div style="width: 20%; background: #94a3b8; height: 40%; border-radius: 5px;"></div>
                        <div style="width: 20%; background: #0f3057; height: 80%; border-radius: 5px;"></div>
                        <div style="width: 20%; background: #3b82f6; height: 100%; border-radius: 5px;"></div>
                        <div style="width: 20%; background: #94a3b8; height: 30%; border-radius: 5px;"></div>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="crex-dark-card shadow-lg">
                    <h5 class="fw-bold mb-4">Pengecekan BPJS</h5>
                    
                    <div class="bpjs-input-group">
                        <input type="text" id="adminInput" placeholder="Ketik nama: John / Jane">
                        <button onclick="cekBpjsAdmin()">Check</button>
                    </div>
                    
                    <div id="hasilAdmin" class="d-none mt-4 p-3 bg-white text-dark rounded-4 shadow-sm">
                        <h6 class="fw-bold mb-1" id="resNamaAdmin">Nama Pasien</h6>
                        <div class="mb-3" id="resStatusAdmin">Status BPJS</div>
                        <div id="btnAksiAdmin"></div>
                    </div>

                    <div class="mt-4 small opacity-75">
                        <div class="d-flex align-items-center gap-3 mb-2"><i class="bi bi-check-circle-fill text-info"></i> Verify John (Done)</div>
                        <div class="d-flex align-items-center gap-3"><i class="bi bi-circle"></i> Verify Ashley</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../assets/js/script.js"></script>
</body>
</html>
