<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediFlow - Premium Healthcare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="login-mode">

    <div class="login-wrapper">
        <div class="login-split">
            <div class="log-left">
                <div class="d-flex align-items-center mb-4">
                    <i class="bi bi-hospital fs-2 text-primary me-2"></i>
                    <h3 class="fw-bold text-primary mb-0">MediFlow</h3>
                </div>
                <h3 class="fw-bold mb-2">Login Sistem Terpadu</h3>
                <p class="text-muted small mb-4">Masuk untuk mengakses portal manajemen rumah sakit.</p>
                
                <label class="fw-bold small mb-2 text-dark">Username</label>
                <input type="text" id="loginUsername" class="med-input" placeholder="Ketik: pasien / dokter / admin">
                
                <label class="fw-bold small mb-2 text-dark">Password</label>
                <input type="password" class="med-input" placeholder="••••••••">
                
                <button onclick="prosesLogin()" class="btn-log mb-4">Login Sekarang →</button>
            </div>
            <div class="log-right">
                <i class="bi bi-shield-check" style="font-size: 4rem;"></i>
                <h3 class="fw-bold mt-3">Premium Healthcare</h3>
                <p class="opacity-75 small px-4 mt-2">Sistem terintegrasi untuk pendaftaran, rekam medis, dan administrasi rumah sakit.</p>
            </div>
        </div>
    </div>
    <script src="assets/script.js"></script>
</body>
</html>
