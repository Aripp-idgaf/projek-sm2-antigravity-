<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediFlow - Sign In</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="login-mode">

    <div class="login-wrapper">
        <div class="login-split">
            
            <div class="log-left" id="bg-slider">
                <div class="slider-overlay"></div>
                <div class="cal-logo">
                    <i class="bi bi-c-circle-fill"></i> MediFlow
                </div>
                <div class="cal-footer">
                    All Right Reserved. 2026
                </div>
            </div>

            <div class="log-right">
                <button class="top-btn" onclick="alert('Versi demo, gunakan tombol Sign In di bawah.')">Log In</button>
                
                <div class="form-center">
                    <div class="form-logo">
                        <i class="bi bi-c-circle-fill"></i>
                    </div>
                    <h3>Sign In</h3>
                    <p>Log in to your membership</p>

                    <div class="input-icon">
                        <i class="bi bi-person"></i>
                        <input type="text" id="loginUsername" class="cal-input" placeholder="Enter User Name (pasien/dokter/admin)">
                    </div>
                    
                    <div class="input-icon">
                        <i class="bi bi-envelope"></i>
                        <input type="email" class="cal-input" placeholder="Enter Email (Optional)">
                    </div>

                    <div class="input-icon">
                        <i class="bi bi-lock"></i>
                        <input type="password" class="cal-input" placeholder="Password">
                    </div>

                    <div class="check-container">
                        <input type="checkbox" id="terms">
                        <label for="terms">I read and agree to the <a href="#">Terms of use</a></label>
                    </div>

                    <button class="btn-cal" onclick="prosesLogin()">Sign In</button>

                    <div class="bottom-link">
                        Need an account? <a href="#">Sign Up</a>
                    </div>
                </div>

                <div class="right-footer">
                    <a href="#">Contact Us</a> | <a href="#">About Us</a> | <a href="#">FAQ</a>
                </div>
            </div>

        </div>
    </div>

    <script>
        // 1. Fungsi Routing Login
        function prosesLogin() {
            const user = document.getElementById('loginUsername').value.toLowerCase().trim();
            
            if(user === 'pasien') {
                window.location.href = 'pages/pasien.html';
            } else if(user === 'dokter') {
                window.location.href = 'pages/dokter.html';
            } else if(user === 'admin') {
                window.location.href = 'pages/admin.html';
            } else {
                alert('Username salah! Harap ketik: pasien, dokter, atau admin');
            }
        }

        // 2. Fungsi Slider Gambar (Tema Kesehatan Tanpa Biru Tua)
        const sliderDiv = document.getElementById('bg-slider');
        
        // Kumpulan gambar medis cerah (Stetoskop, Dokter, Lab)
        const images = [
            "url('https://images.unsplash.com/photo-1584982751601-97dcc096659c?q=80&w=1000&auto=format&fit=crop')", // Stetoskop Cerah
            "url('https://images.unsplash.com/photo-1516549655169-df83a0774514?q=80&w=1000&auto=format&fit=crop')", // Laboratorium
            "url('https://images.unsplash.com/photo-1551076805-e18690c5e561?q=80&w=1000&auto=format&fit=crop')"  // Rumah Sakit / Lorong Terang
        ];
        
        let i = 0;
        function gantiGambar() {
            sliderDiv.style.backgroundImage = images[i];
            i = (i + 1) % images.length; // Loop kembali ke 0 jika sudah gambar terakhir
        }

        // Jalankan gantiGambar setiap 4 detik (4000ms)
        setInterval(gantiGambar, 4000);
        
        // Panggil 1x saat pertama kali web dibuka
        gantiGambar();
    </script>
</body>
</html>
