<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediFlow - Sign In</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* RESET DASAR */
        * { box-sizing: border-box; }

        /* --- 1. ANIMASI MELAYANG HALUS --- */
        @keyframes floatAnim {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-25px) rotate(8deg); }
        }

        /* --- 2. LATAR BELAKANG BIRU MUDA BERSIH --- */
        body.login-mode {
            background-color: #e0f7fa; 
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
            overflow: hidden;
            position: relative;
            font-family: 'Poppins', sans-serif;
        }

        /* --- 3. SISTEM IKON BACKGROUND ALAT MEDIS (RAMAI) --- */
        .bg-icon-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .bg-icon {
            position: absolute;
            color: #38c8e6; 
            opacity: 0.18; 
            animation: floatAnim 8s ease-in-out infinite;
        }

        /* Sebaran Ikon Alat Medis di Seluruh Layar */
        .i1 { top: 5%; left: 5%; font-size: 7rem; }
        .i2 { top: 12%; left: 22%; font-size: 4rem; animation-delay: 1s; }
        .i3 { top: 5%; right: 8%; font-size: 8rem; animation-delay: 2s; }
        .i4 { top: 25%; right: 20%; font-size: 5rem; animation-delay: 0.5s; }
        .i5 { bottom: 8%; left: 6%; font-size: 9rem; animation-delay: 3s; }
        .i6 { bottom: 25%; left: 25%; font-size: 4rem; animation-delay: 1.5s; }
        .i7 { bottom: 10%; right: 10%; font-size: 7rem; animation-delay: 4s; }
        .i8 { bottom: 35%; right: 28%; font-size: 5rem; animation-delay: 2.5s; }
        .i9 { top: 45%; left: 8%; font-size: 5rem; animation-delay: 1.2s; }
        .i10 { top: 40%; right: 5%; font-size: 6rem; animation-delay: 0.8s; }
        .i11 { top: 20%; left: 40%; font-size: 3.5rem; animation-delay: 4.5s; }
        .i12 { bottom: 20%; right: 45%; font-size: 4.5rem; animation-delay: 3.2s; }

        /* --- 4. LAYOUT LOGIN UTAMA (LEBAR & LEGA) --- */
        .login-wrapper {
            position: relative;
            z-index: 10;
        }

        .login-split {
            /* 🔥 EFEK SHADOW BARU YANG ELEGAN ADA DI SINI 🔥 */
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.18), 0 5px 15px rgba(0, 0, 0, 0.08);
            border-radius: 20px;
            overflow: hidden;
            background: white;
            display: flex;
            width: 1050px; 
            max-width: 100%;
            min-height: 580px; 
        }

        .log-left {
            flex: 1; 
            position: relative; 
            overflow: hidden; 
            padding: 40px; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between;
        }

        .log-right {
            flex: 1.1; 
            padding: 50px 70px; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: stretch; 
        }

        .slider-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(52, 73, 94, 0.6); 
            z-index: 1;
        }

        /* Branding Panel Kiri */
        .cal-logo {
            display: flex; align-items: center; 
            color: white; font-weight: 600; font-size: 1.3rem;
            position: relative; z-index: 2;
        }
        /* Menggunakan icon detak jantung seperti di dashboard */
        .cal-logo i { font-size: 1.8rem; margin-right: 12px; color: #38c8e6; }

        /* Ikon Header Form Kanan */
        .form-logo { text-align: center; margin-bottom: 10px; }
        /* Menggunakan icon detak jantung seperti di dashboard */
        .form-logo i { font-size: 4.5rem; color: #38c8e6; }

        /* Input Styling */
        .input-icon { position: relative; margin-bottom: 18px; width: 100%; }
        .input-icon i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: #999; z-index: 5;}
        
        .cal-input {
            width: 100%; border-radius: 50px !important;
            padding: 12px 15px 12px 45px !important; 
            border: 1px solid #eaeaea !important;
            font-size: 0.85rem; color: #555;
        }
        .cal-input:focus { border-color: #38c8e6 !important; box-shadow: 0 0 0 3px rgba(56, 200, 230, 0.1) !important; outline: none;}

        .btn-cal {
            background-color: #38c8e6; color: white; border: none; width: 100%; padding: 14px;
            border-radius: 50px; font-weight: 600; transition: 0.3s; margin-top: 5px;
        }
        .btn-cal:hover { background-color: #2ab5d3; transform: translateY(-2px); }

        .cal-footer { position: relative; z-index: 2; color: rgba(255,255,255,0.8); font-size: 0.8rem; }
    </style>
</head>
<body class="login-mode">

    <div class="bg-icon-container">
        <i class="bi bi-stethoscope bg-icon i1"></i>
        <i class="bi bi-capsule bg-icon i2"></i>
        <i class="bi bi-heart-pulse bg-icon i3"></i>
        <i class="bi bi-syringe bg-icon i4"></i>
        <i class="bi bi-bandaid bg-icon i5"></i>
        <i class="bi bi-thermometer-half bg-icon i6"></i>
        <i class="bi bi-droplet-fill bg-icon i7"></i>
        <i class="bi bi-clipboard2-pulse bg-icon i8"></i>
        <i class="bi bi-capsule-pill bg-icon i9"></i>
        <i class="bi bi-virus bg-icon i10"></i>
        <i class="bi bi-medicine-bottle bg-icon i11"></i>
        <i class="bi bi-lungs bg-icon i12"></i>
    </div>

    <div class="login-wrapper">
        <div class="login-split">
            
            <div class="log-left">
                <img id="slider-image" src="images/wallpaper/rs1.jpg" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; transition: opacity 0.8s ease-in-out;">
                <div class="slider-overlay"></div>
                <div class="cal-logo">
                    <i class="bi bi-heart-pulse"></i>
                    <span>MediFlow</span>
                </div>
                <div class="cal-footer">
                    All Right Reserved. 2026
                </div>
            </div>

            <div class="log-right">
                <div class="form-center">
                    <div class="form-logo">
                        <i class="bi bi-heart-pulse"></i>
                    </div>
                    <h3 style="color: #333; text-align: center; margin-bottom: 5px; font-weight: 600;">Sign In</h3>
                    <p style="color: #999; text-align: center; font-size: 0.85rem; margin-bottom: 25px;">Log in to your membership</p>

                    <div class="input-icon">
                        <i class="bi bi-person"></i>
                        <input type="text" id="loginUsername" class="cal-input" placeholder="Enter User Name (pasien/dokter/admin)">
                    </div>
                    <div class="input-icon">
                        <i class="bi bi-envelope"></i>
                        <input type="email" class="cal-input" placeholder="Enter Email (Optional)">
                    </div>
                    <div class="input-icon">
                        <i class="bi bi-lock"></i>
                        <input type="password" class="cal-input" placeholder="Password">
                    </div>

                    <div class="text-center mb-3" style="font-size: 0.8rem;">
                        <input type="checkbox" id="terms">
                        <label for="terms" style="color: #777;"> I read and agree to the <a href="#" style="color: #38c8e6; text-decoration: none;">Terms of use</a></label>
                    </div>

                    <button class="btn-cal" onclick="prosesLogin()">Sign In</button>

                    <div class="text-center mt-3" style="font-size: 0.85rem; color: #999;">
                        Need an account? <a href="#" style="color: #38c8e6; text-decoration: none; font-weight: 600;">Sign Up</a>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="js/script.js"></script>

    <script>
        const sliderImg = document.getElementById('slider-image');
        
        const images = ["images/wallpaper/rs1.jpg", "images/wallpaper/rs2.jpg", "images/wallpaper/rs3.jpg", "images/wallpaper/rs4.jpg", "images/wallpaper/rs5.png"];
        
        images.forEach(src => { let i = new Image(); i.src = src; });
        
        let i = 0;
        function gantiGambar() {
            i = (i + 1) % images.length; 
            sliderImg.style.opacity = 0; 
            setTimeout(() => {
                sliderImg.src = images[i];
                sliderImg.style.opacity = 1; 
            }, 800); 
        }
        setInterval(gantiGambar, 4500);
    </script>
</body>
</html>
